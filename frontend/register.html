<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ScaleUp - Create Account</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>

<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white p-8 rounded-3xl shadow-xl w-full max-w-md border border-slate-100">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-slate-900 mb-2">Create Account</h1>
            <p class="text-slate-500">Join ScaleUp to unlock AI growth insights</p>
        </div>

        <form id="registerForm" class="space-y-5" onsubmit="handleRegister(event)">
            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-2">Full Name</label>
                <input id="name" type="text" required
                    class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none transition-all"
                    placeholder="John Doe">
            </div>
            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-2">Email Address</label>
                <input id="email" type="email" required
                    class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none transition-all"
                    placeholder="john@example.com">
            </div>
            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-2">Password</label>
                <input id="password" type="password" required
                    class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none transition-all"
                    placeholder="••••••••">
            </div>

            <button type="submit"
                class="w-full bg-indigo-600 text-white font-bold py-4 rounded-xl hover:bg-indigo-700 transition-colors shadow-lg shadow-indigo-200">
                Create Account →
            </button>

            <div class="relative py-4">
                <div class="absolute inset-0 flex items-center">
                    <div class="w-full border-t border-slate-100"></div>
                </div>
                <div class="relative flex justify-center text-xs uppercase"><span
                        class="bg-white px-2 text-slate-400 font-bold">Or continue with</span></div>
            </div>

            <button type="button" onclick="handleGoogleLogin()"
                class="w-full flex items-center justify-center gap-3 px-4 py-3 border border-slate-200 rounded-xl hover:bg-slate-50 transition-colors font-semibold">
                <img src="https://www.gstatic.com/images/branding/product/1x/google_24dp.png" alt="Google"
                    class="w-5 h-5">
                Sign up with Google
            </button>
        </form>

        <p class="text-center mt-8 text-sm text-slate-500">
            Already have an account? <a href="login.html" class="text-indigo-600 font-bold hover:underline">Log in</a>
        </p>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAfepMs17arZb5G1YvwNS8JPuawIoWXW2U",
            authDomain: "scaleup-542a9.firebaseapp.com",
            projectId: "scaleup-542a9",
            storageBucket: "scaleup-542a9.firebasestorage.app",
            messagingSenderId: "612010083462",
            appId: "1:612010083462:web:3ecb8f49a06351a0df7d07"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        async function handleRegister(e) {
            e.preventDefault();
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;

            try {
                await auth.createUserWithEmailAndPassword(email, password);
                window.location.href = "profile.html";
            } catch (error) {
                alert(error.message);
            }
        }

        async function handleGoogleLogin() {
            const provider = new firebase.auth.GoogleAuthProvider();
            try {
                await auth.signInWithPopup(provider);
                window.location.href = "profile.html";
            } catch (error) {
                alert(error.message);
            }
        }
    </script>
</body>

</html>
